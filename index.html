<!DOCTYPE html>
<html>
<head>
    <title>FIFA Fantasy 2026</title>
    <style>body { font-family: sans-serif; padding: 20px; } .match { margin-bottom: 15px; border-bottom: 1px solid #ccc; }</style>
</head>
<body>
    <h1>FIFA Fantasy 2026</h1>
    <button id="loginBtn">Login with Google</button>
    <div id="app" style="display:none;">
        <p>Welcome, <span id="userName"></span></p>
        <div id="matchesContainer"></div>
        <button onclick="submitPredictions()">Submit Predictions</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrAVo6DZafG3vxftopaVB7V0QaxzuTwYc",
            authDomain: "fifafantasy2026-704d9.firebaseapp.com",
            projectId: "fifafantasy2026-704d9",
            storageBucket: "fifafantasy2026-704d9.firebasestorage.app",
            messagingSenderId: "510838555863",
            appId: "1:510838555863:web:2782ca41fedfdfcdc75c92",
            measurementId: "G-BQ7LQPBYJ6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
                
                const snapshot = await getDocs(collection(db, "Matches"));
                const container = document.getElementById('matchesContainer');
                snapshot.forEach(doc => {
                    const m = doc.data();
                    container.innerHTML += `<div class="match" id="match-${m.matchId}">
                        ${m.teamA} vs ${m.teamB} <br>
                        <input type="number" placeholder="Goals A" id="a-${m.matchId}">
                        <input type="number" placeholder="Goals B" id="b-${m.matchId}">
                    </div>`;
                });
            }
        });    

        window.submitPredictions = async () => {
            const predictions = [];
            document.querySelectorAll('.match').forEach(m => {
                const id = m.id.split('-')[1];
                predictions.push({
                    matchId: id,
                    a: document.getElementById(`a-${id}`).value,
                    b: document.getElementById(`b-${id}`).value
                });
            });
            await addDoc(collection(db, "Predictions"), {
                userId: auth.currentUser.uid,
                userName: auth.currentUser.displayName,
                predictions: predictions
            });
            alert("Predictions Saved!");
        };
    </script>
</body>
</html>
